name: Publish update manifest

# Regenerates updates.json whenever a release is published, so self-distributed
# installs auto-update. Can also be run manually against an existing tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)generate updates.json for (e.g. v0.1.3)"
        required: true

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve tag and URLs
        id: v
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          XPI="tb-thread-summarizer-${VERSION}.xpi"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${XPI}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "xpi=$XPI"
            echo "url=$URL"
          } >> "$GITHUB_OUTPUT"

      - name: Download the released .xpi and hash it
        id: h
        run: |
          curl -fsSL -o "${{ steps.v.outputs.xpi }}" "${{ steps.v.outputs.url }}"
          echo "hash=sha256:$(sha256sum "${{ steps.v.outputs.xpi }}" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Generate updates.json
        run: |
          node scripts/gen-updates-json.mjs \
            "${{ steps.v.outputs.version }}" \
            "${{ steps.v.outputs.url }}" \
            "${{ steps.h.outputs.hash }}" > updates.json
          cat updates.json

      - name: Commit updates.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates.json
          if git diff --cached --quiet; then
            echo "updates.json already up to date — nothing to commit."
          else
            git commit -m "chore: update updates.json for ${{ steps.v.outputs.tag }}"
            git push
          fi

      - name: Clean up
        if: always()
        run: rm -f "${{ steps.v.outputs.xpi }}"
